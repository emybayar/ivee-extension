<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Improver by ivee</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 300px;
        background-color: #f0f4f9;
        background-image:
          linear-gradient(rgba(99, 120, 180, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(99, 120, 180, 0.04) 1px, transparent 1px);
        background-size: 12px 12px;
        color: #1a2340;
        font-family:
          "Poppins",
          -apple-system,
          BlinkMacSystemFont,
          "Inter",
          sans-serif;
        font-size: 13px;
      }
      .header {
        padding: 16px 18px 14px;
        border-bottom: 1px solid #e4e7f0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #ffffff;
      }
      .brand {
        font-weight: 700;
        font-size: 16px;
        color: #1a2340;
        letter-spacing: -0.01em;
      }
      .brand .dot {
        color: #25397a;
      }
      .brand-logo {
        height: 24px;
        width: auto;
        display: block;
      }
      .tagline {
        font-size: 11px;
        color: #9aa0b4;
        margin-top: 2px;
      }
      /* .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #34d399;
        box-shadow: 0 0 0 2px rgba(52, 211, 153, 0.2);
      }
      .status-dot.inactive {
        background: #d1d5e0;
        box-shadow: none;
      } */
      .body {
        padding: 16px 18px;
        background: #f7f8fa;
      }

      .tip {
        background: #ffffff;
        border: 1px solid #e4e7f0;
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 14px;
      }
      .tip-title {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: #9aa0b4;
        margin-bottom: 6px;
      }
      .tip p {
        font-size: 12px;
        color: #4a5568;
        line-height: 1.6;
      }
      .tip strong {
        color: #25397a;
        font-weight: 600;
      }
      .cta-link {
        display: block;
        text-align: center;
        font-size: 12px;
        font-weight: 600;
        color: #25397a;
        text-decoration: none;
        padding: 4px 0 2px;
      }
      .cta-link:hover {
        text-decoration: underline;
      }
      .divider {
        height: 1px;
        background: #e4e7f0;
        margin: 14px 0;
      }
      .sites-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: #9aa0b4;
        margin-bottom: 9px;
      }
      .sites {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .site-pill {
        background: #ffffff;
        border: 1px solid #e4e7f0;
        border-radius: 12px;
        padding: 3px 10px;
        font-size: 11px;
        color: #6b7280;
      }
      .footer {
        padding: 10px 18px 14px;
        font-size: 10px;
        color: #c4c9d8;
        text-align: center;
        letter-spacing: 0.03em;
        border-top: 1px solid #e4e7f0;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <img src="icons/ivee-logo.svg" class="brand-logo" alt="ivee" />
        <div class="tagline">Prompt Improver</div>
      </div>
      <!-- <div class="status-dot inactive" id="statusDot"></div> -->
    </div>

    <div class="body">
      <div class="tip">
        <div class="tip-title">How to Use</div>
        <p>
          Highlight any prompt on ChatGPT, Claude, Gemini, or Perplexity and
          click <strong>Improve with ivee</strong>.
        </p>
      </div>

      <div class="divider"></div>

      <div class="sites-label">Active on</div>
      <div class="sites">
        <span class="site-pill">ChatGPT</span>
        <span class="site-pill">Claude</span>
        <span class="site-pill">Gemini</span>
        <span class="site-pill">Perplexity</span>
      </div>

      <div class="divider"></div>

      <a class="cta-link" href="https://ivee.jobs" target="_blank"
        >Join ivee for free →</a
      >
    </div>

    <!-- <div class="footer">Highlight any prompt text to improve it</div> -->

    <!-- <script src="popup.js"></script> -->
  </body>
</html>
