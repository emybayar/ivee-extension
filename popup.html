<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ivee</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 300px;
        background-color: #f0f4f9;
        background-image:
          linear-gradient(rgba(99, 120, 180, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(99, 120, 180, 0.04) 1px, transparent 1px);
        background-size: 12px 12px;
        color: #1a2340;
        font-family:
          "Poppins",
          -apple-system,
          BlinkMacSystemFont,
          "Inter",
          sans-serif;
        font-size: 13px;
      }
      .header {
        padding: 16px 18px 14px;
        border-bottom: 1px solid #e4e7f0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #ffffff;
      }
      .brand {
        font-weight: 700;
        font-size: 16px;
        color: #1a2340;
        letter-spacing: -0.01em;
      }
      .brand .dot {
        color: #4f6ef7;
      }
      .tagline {
        font-size: 11px;
        color: #9aa0b4;
        margin-top: 2px;
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #34d399;
        box-shadow: 0 0 0 2px rgba(52, 211, 153, 0.2);
      }
      .status-dot.inactive {
        background: #d1d5e0;
        box-shadow: none;
      }
      .body {
        padding: 16px 18px;
        background: #f7f8fa;
      }
      label {
        display: block;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: #9aa0b4;
        margin-bottom: 7px;
      }
      .input-row {
        display: flex;
        gap: 8px;
      }
      input[type="password"] {
        flex: 1;
        background: #ffffff;
        border: 1px solid #e4e7f0;
        border-radius: 8px;
        padding: 9px 12px;
        color: #1a2340;
        font-size: 12px;
        font-family: inherit;
        outline: none;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      input[type="password"]:focus {
        border-color: #4f6ef7;
        box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.12);
      }
      input[type="password"]::placeholder {
        color: #c4c9d8;
      }
      button {
        background: #4f6ef7;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        padding: 9px 14px;
        font-weight: 600;
        font-size: 12px;
        cursor: pointer;
        font-family: inherit;
        transition:
          background 0.15s,
          box-shadow 0.15s;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(79, 110, 247, 0.25);
      }
      button:hover {
        background: #3d5ef6;
        box-shadow: 0 4px 12px rgba(79, 110, 247, 0.35);
      }
      .msg {
        margin-top: 8px;
        font-size: 11px;
        color: #9aa0b4;
        min-height: 16px;
      }
      .msg.success {
        color: #34d399;
      }
      .msg.error {
        color: #f87171;
      }
      .divider {
        height: 1px;
        background: #e4e7f0;
        margin: 14px 0;
      }
      .sites-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: #9aa0b4;
        margin-bottom: 9px;
      }
      .sites {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .site-pill {
        background: #ffffff;
        border: 1px solid #e4e7f0;
        border-radius: 12px;
        padding: 3px 10px;
        font-size: 11px;
        color: #6b7280;
      }
      .footer {
        padding: 10px 18px 14px;
        font-size: 10px;
        color: #c4c9d8;
        text-align: center;
        letter-spacing: 0.03em;
        border-top: 1px solid #e4e7f0;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <div class="brand">ivee<span class="dot">.</span></div>
        <div class="tagline">Prompt Improver</div>
      </div>
      <div class="status-dot inactive" id="statusDot"></div>
    </div>

    <div class="body">
      <label>OpenAI API Key</label>
      <div class="input-row">
        <input
          type="password"
          id="apiKey"
          placeholder="sk-..."
          autocomplete="off"
        />
        <button id="saveBtn">Save</button>
      </div>
      <div class="msg" id="msg"></div>

      <div class="divider"></div>

      <div class="sites-label">Active on</div>
      <div class="sites">
        <span class="site-pill">ChatGPT</span>
        <span class="site-pill">Claude</span>
        <span class="site-pill">Gemini</span>
        <span class="site-pill">Perplexity</span>
      </div>
    </div>

    <div class="footer">Highlight any prompt text to improve it</div>

    <script src="popup.js"></script>
  </body>
</html>
